name: Deploy CustomGPT Affiliate Funnel

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      publish_to_buffer:
        description: "Submit this generated queue to Buffer if secrets are configured"
        required: false
        default: "false"
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: npm install
      - name: Install browser renderer
        run: npx playwright install --with-deps chromium
      - name: Generate funnel
        run: node scripts/generate-machine.js
      - name: Render PNG cards
        run: node scripts/render-cards.js
      - name: Generate Publer exports
        run: node scripts/publer-export.js
      - name: Publish or dry-run Buffer queue
        env:
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
          BUFFER_CHANNEL_MAP: ${{ secrets.BUFFER_CHANNEL_MAP }}
          BUFFER_CHANNELS: ${{ vars.BUFFER_CHANNELS }}
          BUFFER_MAX_POSTS: ${{ vars.BUFFER_MAX_POSTS }}
          BUFFER_MODE: ${{ vars.BUFFER_MODE }}
          BUFFER_AUTOPUBLISH: ${{ vars.BUFFER_AUTOPUBLISH }}
          DISPATCH_PUBLISH: ${{ inputs.publish_to_buffer }}
        run: |
          if [ -n "$BUFFER_API_KEY" ] && [ -n "$BUFFER_CHANNEL_MAP" ] && { [ "$BUFFER_AUTOPUBLISH" = "true" ] || [ "$DISPATCH_PUBLISH" = "true" ]; }; then
            BUFFER_PUBLISH=true node scripts/buffer-publish.js
          else
            node scripts/buffer-publish.js
          fi
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
